spring.application.name=Prueba Tecnica

spring.mvc.problemdetails.enabled=true

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.one-indexed-parameters=false
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
spring.data.web.pageable.sort-parameter=sort
spring.data.web.sort.default=id,asc

spring.cache.type=caffeine
spring.cache.cache-names=branch_list,branch_id,product_list,product_id,sale_list,statistics_best_selling,statistics_revenue
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m

spring.datasource.url=jdbc:postgresql://localhost:5432/sucursal_db
spring.datasource.username=neisser
spring.datasource.password=12345678

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format-sql=true